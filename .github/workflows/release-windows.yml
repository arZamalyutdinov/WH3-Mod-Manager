name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v2.17.5)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build Windows artifact and publish release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is empty"
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tag must start with 'v'"
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Sync package version to tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "Failed to derive version from tag: $RELEASE_TAG"
            exit 1
          fi

          echo "Setting package.json version to $VERSION"
          node -e "const fs=require('fs'); const tag=process.env.RELEASE_TAG || ''; const version=tag.replace(/^v/, ''); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.1

      - name: Enable Corepack and activate Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn --version

      - name: Ensure Yarn node-modules linker
        shell: bash
        run: |
          if [ ! -f .yarnrc.yml ]; then
            printf "nodeLinker: node-modules\n" > .yarnrc.yml
          fi

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test:unit

      - name: Build Windows package
        run: yarn make

      - name: List generated files
        shell: pwsh
        run: |
          Get-ChildItem -Path out/make -Recurse | Select-Object FullName

      - name: Resolve Windows zip metadata
        id: zipmeta
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "out/make/zip/win32" -Recurse -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            throw "No Windows zip release asset was generated in out/make/zip/win32."
          }

          "zip_path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zip_name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved zip asset: $($zip.Name)"

      - name: Ensure NSIS is available
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
            "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }
          makensis /VERSION

      - name: Build Windows bootstrap installer
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_ZIP_ASSET: ${{ steps.zipmeta.outputs.zip_name }}
        run: |
          $version = $env:RELEASE_TAG.TrimStart("v")
          New-Item -ItemType Directory -Path "out/installer" -Force | Out-Null

          makensis `
            "/DAPP_VERSION=$version" `
            "/DRELEASE_TAG=$env:RELEASE_TAG" `
            "/DRELEASE_REPOSITORY=$env:RELEASE_REPOSITORY" `
            "/DRELEASE_ZIP_ASSET=$env:RELEASE_ZIP_ASSET" `
            "/DOUT_FILE=out/installer/WH3MM-Installer-$env:RELEASE_TAG.exe" `
            "installer/windows/wh3mm-bootstrapper.nsi"

      - name: List installer outputs
        shell: pwsh
        run: |
          Get-ChildItem -Path out/installer -Recurse | Select-Object FullName

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wh3mm-windows-${{ steps.meta.outputs.tag }}
          path: |
            out/make/zip/win32/**/*.zip
            out/installer/*.exe
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            out/make/zip/win32/**/*.zip
            out/installer/*.exe
          fail_on_unmatched_files: true
